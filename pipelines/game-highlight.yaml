# game-highlight — 游戏高光混剪管道
#
# 将手动标记的片段 → 验证 → 音频 → 字幕 → 合成 → 质检的多阶段生产流水线。
# 每个阶段产出可检查的 artifact，关键节点 checkpoint。
#
# 适用于: FPS/MOBA/自走棋 等游戏的高光/搞笑混剪

name: game-highlight
version: "0.3"
description: >
  游戏高光混剪生产管道。从手动标记的片段开始，
  经验证、音频准备、字幕生成、视频合成到最终质量检查。
  每个阶段产出结构化 artifact，支持 checkpoint 断点续跑。

category: custom
stability: beta

orchestration:
  mode: sequential
  checkpoint_policy: guided

# ─── Stages ─────────────────────────────────────────────────────────

stages:

  # Stage 1 — 验证时间轴合法性
  - name: validate
    produces: validation_report
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - 每个片段时长 ≥ 1.5 秒（信息归零阈值）
      - 片段总数 ≥ 1
      - 过渡参数合法（effect 在 [cut, flash, dissolve] 中）
    success_criteria:
      - clip_count ≥ 1

  # Stage 2 — 音频准备
  - name: audio_prep
    requires: validation_report
    produces: audio_manifest
    checkpoint_required: false
    human_approval_default: false
    review_focus:
      - BGM 与对白音量比在 1:4 ~ 1:3 之间
      - 静音段不超过 2 秒
      - 音频峰值不超过 0dB（避免削波）
    success_criteria:
      - dialogue_to_bgm_ratio between 2.0 and 5.0

  # Stage 3 — 字幕生成
  - name: subtitle
    requires: [validation_report, audio_manifest]
    produces: subtitle_manifest
    checkpoint_required: false
    human_approval_default: false
    review_focus:
      - 单行字幕不超过 20 字
      - 字幕显示时长 ≥ 0.5 秒
      - 字幕与标记时间戳对齐
    success_criteria:
      - subtitle_count ≥ 0

  # Stage 4 — 视频合成
  - name: compose
    requires: [validation_report, audio_manifest, subtitle_manifest]
    produces: composition_report
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - xfade 转场参数正确（flash→fadewhite, dissolve→fade）
      - 输出时长与时间轴一致（偏差 < 1%）
      - 输出文件存在且非空
    success_criteria:
      - output_duration matches expected_duration within 1%

  # Stage 5 — 质量检查
  - name: quality_check
    requires: composition_report
    produces: qc_report
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - 无连续黑帧
      - 音频轨道存在
      - 音画同步
      - 文件大小合理
    success_criteria:
      - black_frames = 0
      - audio_present = true

# ─── 风格剧本（可选覆盖默认规则）───────────────────────────────────────

playbook:
  flash_color: "#FFE4B5"       # 暖色柔光，禁止纯白
  flash_opacity: 0.25
  min_clip_duration: 1.5       # 最短片段（秒）
  max_clip_duration: 30        # 最长片段（秒）
  transition_types: [cut, flash, dissolve]
  end_transition: fade_out     # 结尾渐变黑，非纯黑硬切
  duplicate_prevention: true   # 相邻不重复同一素材段
